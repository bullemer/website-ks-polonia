name: Deploy to Hetzner Webspace

on:
  push:
    branches:
      - main # Change this to your default branch if it's not 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended version for Astro

      - name: Install Dependencies
        run: npm ci

      - name: Build Astro Website
        run: npm run build
        env:
          VITE_KEYSTATIC_GITHUB_CLIENT_ID: Ov23livPaxPzjXA7k7vR

      - name: Sync Frontend via FTP to Hetzner
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ 
          server-dir: /public_html/ks-polonia/ 
          dry-run: false 
          security: loose
          timeout: 600000

      - name: Sync Backend via FTP to Hetzner
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          protocol: ftps
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/ 
          server-dir: /flaskprojects/kspolonia/backend/ 
          dry-run: false 
          security: loose
          timeout: 600000
