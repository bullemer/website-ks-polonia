<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KS Polonia - Admin Übersicht</title>
    <style>
        :root {
            --primary: #DC143C;
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #111827;
            --border: #e5e7eb;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); padding: 2rem; margin: 0; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--surface); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
        .form-group { margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
        select { padding: 0.75rem; border-radius: 6px; border: 1px solid var(--border); font-size: 1rem; flex-grow: 1; max-width: 400px; }
        button { padding: 0.75rem 1.5rem; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #b91c1c; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); }
        th { background-color: #f3f4f6; color: #374151; font-weight: 600; }
        tr:hover { background-color: #f9fafb; }
        .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; background-color: #ecfdf5; color: #065f46; }
    </style>
</head>
<body>
    <div class="container">
        {% if not authenticated %}
        <div style="max-width: 400px; margin: 0 auto; text-align: center;">
            <h1>KS Polonia Login</h1>
            {% if error %}
            <div style="background-color: #fef2f2; color: #b91c1c; padding: 1rem; border-radius: 6px; margin-bottom: 1.5rem; font-weight: bold;">
                {{ error }}
            </div>
            {% endif %}
            <form method="POST" action="">
                <div style="margin-bottom: 1rem; text-align: left;">
                    <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Benutzername</label>
                    <input type="text" id="username" name="username" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 1.5rem; text-align: left;">
                    <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: bold;">Passwort</label>
                    <input type="password" id="password" name="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; box-sizing: border-box;">
                </div>
                <button type="submit" style="width: 100%; padding: 1rem;">Anmelden</button>
            </form>
        </div>
        {% else %}
        <h1>Vereinsübersicht: Mannschaften & Spieler</h1>
        
        <form method="GET" action="" class="form-group">
            <label for="team_id"><strong>Mannschaft wählen:</strong></label>
            <select name="team_id" id="team_id" onchange="this.form.submit()">
                <option value="">-- Bitte auswählen --</option>
                {% for team in teams %}
                    <option value="{{ team['id'] }}" {% if selected_team_id == team['id']|string %}selected{% endif %}>
                        {{ team['mannschaftsart'] }} | {{ team['mannschaftsname'] }} ({{ team['spielklasse'] }})
                    </option>
                {% endfor %}
            </select>
            <button type="submit">Anzeigen</button>
        </form>

                    </tbody>
                </table>
            {% else %}
                <p style="color: #6b7280; font-style: italic;">Keine Spieler für diese Mannschaft gefunden.</p>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
